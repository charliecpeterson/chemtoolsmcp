# chemtools runner profiles for TACC Stampede3
#
# Place this file somewhere on Stampede3, e.g.:
#   ~/.config/chemtools/runner_profiles.yaml
#
# Then tell the MCP server where to find it via the environment variable:
#   export CHEMTOOLS_RUNNER_PROFILES=~/.config/chemtools/runner_profiles.yaml
#
# Or set it in your .mcp.json "env" block (see .mcp.json in this directory).
#
# Edit nwchem_executable to match your NWChem installation.

schema_version: "1.0"

profiles:

  stampede3_skx:
    description: >
      Stampede3 SKX nodes — Intel Skylake, 48 cores/node.
      Default profile for most DFT/SCF calculations.
    launcher:
      kind: "scheduler"
      submit_command: "sbatch"
      scheduler_type: "slurm"
      job_id_regex: "Submitted batch job (\\d+)"
      status_command: "squeue -j {job_id} -h -o %T"
      cancel_command: "scancel {job_id}"
    scheduler:
      system: "slurm"
      script_template: |
        #!/bin/bash
        #SBATCH -J {job_name}
        #SBATCH -o {output_file}
        #SBATCH -e {error_file}
        #SBATCH -p {partition}
        #SBATCH -N {nodes}
        #SBATCH -n {mpi_ranks}
        #SBATCH -t {walltime}
        {account_line}

        cd {job_dir}

        {mpi_launch} {nwchem_executable} {input_file}
      submit_script_name: "{job_name}.job"
    execution:
      nwchem_executable: "/home1/01775/charlesp/apps/nwchem/7.2.3/bin/nwchem"
      mpi_launch: "ibrun"
      shell: "/bin/bash"
    resources:
      nodes: 1
      mpi_ranks: 48
      omp_threads: 1
      walltime: "24:00:00"
      partition: "skx"
      account: null          # Set to your allocation, e.g. "TG-CHE123456"
    modules:
      purge_first: false     # Stampede3 login env is usually fine
      load: []
    hooks:
      pre_run: []
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"

  stampede3_skx_dev:
    description: >
      Stampede3 SKX development queue — max 2 hours, priority access.
      Use for short test runs and input debugging before a production job.
    launcher:
      kind: "scheduler"
      submit_command: "sbatch"
      scheduler_type: "slurm"
      job_id_regex: "Submitted batch job (\\d+)"
      status_command: "squeue -j {job_id} -h -o %T"
      cancel_command: "scancel {job_id}"
    scheduler:
      system: "slurm"
      script_template: |
        #!/bin/bash
        #SBATCH -J {job_name}
        #SBATCH -o {output_file}
        #SBATCH -e {error_file}
        #SBATCH -p {partition}
        #SBATCH -N {nodes}
        #SBATCH -n {mpi_ranks}
        #SBATCH -t {walltime}
        {account_line}

        cd {job_dir}

        {mpi_launch} {nwchem_executable} {input_file}
      submit_script_name: "{job_name}.job"
    execution:
      nwchem_executable: "/home1/01775/charlesp/apps/nwchem/7.2.3/bin/nwchem"
      mpi_launch: "ibrun"
      shell: "/bin/bash"
    resources:
      nodes: 1
      mpi_ranks: 48
      omp_threads: 1
      walltime: "02:00:00"   # dev queue hard limit
      partition: "skx-dev"
      account: null
    modules:
      purge_first: false
      load: []
    hooks:
      pre_run: []
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"

  stampede3_spr:
    description: >
      Stampede3 SPR nodes — Intel Sapphire Rapids, 112 cores/node.
      Use for larger calculations that benefit from more cores or memory.
    launcher:
      kind: "scheduler"
      submit_command: "sbatch"
      scheduler_type: "slurm"
      job_id_regex: "Submitted batch job (\\d+)"
      status_command: "squeue -j {job_id} -h -o %T"
      cancel_command: "scancel {job_id}"
    scheduler:
      system: "slurm"
      script_template: |
        #!/bin/bash
        #SBATCH -J {job_name}
        #SBATCH -o {output_file}
        #SBATCH -e {error_file}
        #SBATCH -p {partition}
        #SBATCH -N {nodes}
        #SBATCH -n {mpi_ranks}
        #SBATCH -t {walltime}
        {account_line}

        cd {job_dir}

        {mpi_launch} {nwchem_executable} {input_file}
      submit_script_name: "{job_name}.job"
    execution:
      nwchem_executable: "/home1/01775/charlesp/apps/nwchem/7.2.3/bin/nwchem"
      mpi_launch: "ibrun"
      shell: "/bin/bash"
    resources:
      nodes: 1
      mpi_ranks: 112
      omp_threads: 1
      walltime: "24:00:00"
      partition: "spr"
      account: null
    modules:
      purge_first: false
      load: []
    hooks:
      pre_run: []
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
