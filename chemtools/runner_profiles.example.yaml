schema_version: "1.0"

defaults:
  program: "nwchem"
  input_extension: ".nw"
  output_extension: ".out"
  error_extension: ".err"
  scratch_subdir: "scratch"
  env:
    NWCHEM_BASIS_LIBRARY: null
    NWCHEM_TOP: null

profiles:
  # ---------------------------------------------------------------------------
  # Local / workstation profiles
  # ---------------------------------------------------------------------------

  local:
    description: "Direct local execution on a workstation (single process)."
    launcher:
      kind: "direct"
      command: "nwchem"
    execution:
      command_template: "{launcher} {input_file} > {output_file} 2> {error_file}"
      working_directory: "{job_dir}"
      shell: "/bin/bash"
    resources:
      mpi_ranks: 1
      omp_threads: 1
      memory: null
      walltime: null
      node_memory_mb: null        # Total RAM per node (MB) — enables auto memory ceiling
      max_walltime: null           # Max walltime the queue allows (e.g. "48:00:00")
      cores_per_node: null         # Physical cores per node — enables auto rank selection
      max_nodes: null              # Max nodes available — enables multi-node suggestions
      cpu_arch: null               # CPU microarch (skx, spr, avx2, etc.) — tunes BF/rank
    env:
      OMP_NUM_THREADS: "{omp_threads}"
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"

  local_mpirun:
    description: "Local MPI launch via mpirun. Set mpi_ranks to the number of cores."
    launcher:
      kind: "direct"
      command: "mpirun -np {mpi_ranks} nwchem"
    execution:
      command_template: "{launcher} {input_file} > {output_file} 2> {error_file}"
      working_directory: "{job_dir}"
      shell: "/bin/bash"
    resources:
      mpi_ranks: 8
      omp_threads: 1
      memory: null
      walltime: null
      node_memory_mb: null
      max_walltime: null
      cores_per_node: null
      max_nodes: null
      cpu_arch: null
    env:
      OMP_NUM_THREADS: "{omp_threads}"
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"

  # ---------------------------------------------------------------------------
  # HPC / scheduler profiles
  #
  # Job scripts are written to {job_name}.job (or .slurm/.pbs) in the work dir.
  # After submission, the scheduler job ID is written to {job_name}.jobid so
  # the status/watch/cancel tools can find it without the agent remembering it.
  #
  # Key template placeholders available in script_template:
  #   {job_name}           NWChem start name
  #   {output_file}        stdout redirect ({job_name}.out by default)
  #   {error_file}         stderr redirect ({job_name}.err by default)
  #   {nodes}              from resources.nodes
  #   {mpi_ranks}          from resources.mpi_ranks
  #   {omp_threads}        from resources.omp_threads
  #   {walltime}           from resources.walltime
  #   {partition}          from resources.partition
  #   {account}            from resources.account
  #   {account_line}       "#SBATCH -A <account>" or "" if account is null
  #   {nwchem_executable}  from execution.nwchem_executable
  #   {mpi_launch}         from execution.mpi_launch (e.g. "ibrun" or "mpirun -np 48")
  #   {module_block}       rendered module load commands
  #   {pre_run_block}      rendered hooks.pre_run commands
  #   {job_dir}            directory containing the input file
  #   {input_file}         input filename (basename only)
  # ---------------------------------------------------------------------------

  slurm_cpu:
    description: "Generic SLURM cluster with srun. Customize nwchem_executable and partition."
    launcher:
      kind: "scheduler"
      submit_command: "sbatch"
      scheduler_type: "slurm"
      job_id_regex: "Submitted batch job (\\d+)"
      status_command: "squeue -j {job_id} -h -o %T"
      cancel_command: "scancel {job_id}"
    scheduler:
      system: "slurm"
      script_template: |
        #!/bin/bash
        #SBATCH --job-name={job_name}
        #SBATCH --output={output_file}
        #SBATCH --error={error_file}
        #SBATCH --nodes={nodes}
        #SBATCH --ntasks={mpi_ranks}
        #SBATCH --cpus-per-task={omp_threads}
        #SBATCH --time={walltime}
        #SBATCH --partition={partition}
        {account_line}
        {module_block}
        cd {job_dir}
        export OMP_NUM_THREADS={omp_threads}
        {pre_run_block}
        {mpi_launch} {nwchem_executable} {input_file}
      submit_script_name: "{job_name}.job"
    execution:
      nwchem_executable: "nwchem"
      mpi_launch: "srun"
      shell: "/bin/bash"
    resources:
      nodes: 1
      mpi_ranks: 16
      omp_threads: 1
      walltime: "24:00:00"
      partition: "compute"
      account: null
      node_memory_mb: null        # Set to node RAM in MB for auto memory checks
      max_walltime: null           # Set to max queue walltime
      cores_per_node: null         # Physical cores per node
      max_nodes: null              # Max nodes available for jobs
      cpu_arch: null               # CPU microarch for BF/rank tuning
    modules:
      purge_first: true
      load:
        - "nwchem"
    env: {}
    hooks:
      pre_run: []
      post_run: []
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"

  # ---------------------------------------------------------------------------
  # TACC Stampede3 profiles
  #
  # All Stampede3 profiles share the same launcher, scheduler template, and
  # execution settings.  They differ only in partition hardware specs.
  # The MCP's suggest_nwchem_resources tool reads the hardware fields and
  # picks optimal nodes/ranks/walltime/memory automatically.
  #
  # ibrun is TACC's MPI launcher — it does NOT take -n; it reads the task
  # count from SLURM's allocation.  Never use mpirun/srun on TACC.
  #
  # Charge rates (SU/node-hr): skx=1, icx=1.5, spr=2
  # ---------------------------------------------------------------------------

  stampede3_skx:
    description: >
      TACC Stampede3 SKX partition — 1,060 nodes, 2×24-core Intel Xeon
      Platinum 8160 (Skylake), 192 GB DDR4.  Best balance of memory/core
      and availability for most NWChem DFT/SCF/TCE jobs.
    launcher: &stampede3_launcher
      kind: "scheduler"
      submit_command: "sbatch"
      scheduler_type: "slurm"
      job_id_regex: "Submitted batch job (\\d+)"
      status_command: "squeue -j {job_id} -h -o %T"
      cancel_command: "scancel {job_id}"
    scheduler: &stampede3_scheduler
      system: "slurm"
      script_template: &stampede3_script |
        #!/bin/bash
        #SBATCH -J {job_name}
        #SBATCH -o {output_file}
        #SBATCH -e {error_file}
        #SBATCH -p {partition}
        #SBATCH -N {nodes}
        #SBATCH -n {mpi_ranks}
        #SBATCH -t {walltime}
        {account_line}
        {module_block}
        cd {job_dir}
        {pre_run_block}
        {mpi_launch} {nwchem_executable} {input_file}
      submit_script_name: "{job_name}.job"
    execution: &stampede3_execution
      nwchem_executable: "/home1/01775/charlesp/apps/nwchem/7.2.3/bin/nwchem"
      mpi_launch: "ibrun"
      shell: "/bin/bash"
    resources:
      # --- Default job resources (overridden by suggest_nwchem_resources) ---
      nodes: 1
      mpi_ranks: 48
      omp_threads: 1
      walltime: "24:00:00"
      partition: "skx"
      account: null           # Set to your allocation, or let account_command auto-detect
      account_command: "/usr/local/etc/taccinfo"  # TACC: auto-detect allocation name + SUs
      # --- Hardware description (static — describes the machine) ---
      cores_per_node: 48      # 2×24-core Xeon Platinum 8160
      node_memory_mb: 192000  # 192 GB DDR4
      max_nodes: 256          # Max nodes per job (skx queue limit)
      max_walltime: "48:00:00"
      cpu_arch: "skx"         # Intel Skylake, AVX-512
    modules: &stampede3_modules
      purge_first: false
      load: []
    env: {}
    hooks: &stampede3_hooks_default
      pre_run: []
    file_rules: &stampede3_file_rules
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"

  stampede3_skx_dev:
    description: >
      TACC Stampede3 SKX dev queue — same hardware as skx but 2-hour max
      walltime, 16-node max.  Use for testing inputs and short runs.
    launcher: *stampede3_launcher
    scheduler: *stampede3_scheduler
    execution: *stampede3_execution
    resources:
      nodes: 1
      mpi_ranks: 48
      omp_threads: 1
      walltime: "2:00:00"
      partition: "skx-dev"
      account: null
      account_command: "/usr/local/etc/taccinfo"
      cores_per_node: 48
      node_memory_mb: 192000
      max_nodes: 16           # Dev queue limit
      max_walltime: "2:00:00" # Dev queue: 2 hours max
      cpu_arch: "skx"
    modules: *stampede3_modules
    env: {}
    hooks: *stampede3_hooks_default
    file_rules: *stampede3_file_rules

  stampede3_icx:
    description: >
      TACC Stampede3 ICX partition — 224 nodes, 2×40-core Intel Xeon
      Platinum 8380 (Ice Lake), 256 GB DDR4.  Most memory per core of
      any CPU partition (3.2 GB/core).  Good for memory-hungry DFT or
      correlated methods.  Charge rate: 1.5 SU/node-hr.
    launcher: *stampede3_launcher
    scheduler: *stampede3_scheduler
    execution: *stampede3_execution
    resources:
      nodes: 1
      mpi_ranks: 80
      omp_threads: 1
      walltime: "24:00:00"
      partition: "icx"
      account: null
      account_command: "/usr/local/etc/taccinfo"
      cores_per_node: 80      # 2×40-core Xeon Platinum 8380
      node_memory_mb: 256000  # 256 GB DDR4 — most memory/core on Stampede3
      max_nodes: 32           # Max nodes per job (icx queue limit)
      max_walltime: "48:00:00"
      cpu_arch: "icx"         # Intel Ice Lake, AVX-512
    modules: *stampede3_modules
    env: {}
    hooks: *stampede3_hooks_default
    file_rules: *stampede3_file_rules

  stampede3_spr:
    description: >
      TACC Stampede3 SPR partition — 560 nodes, 2×56-core Intel Xeon
      CPU Max 9480 (Sapphire Rapids), 128 GB HBM2e.  Highest core count
      per node but lowest memory/core (1.1 GB/core).  Best for large jobs
      that are compute-bound, not memory-bound.  Charge rate: 2 SU/node-hr.
      NOTE: /opt/apps/python shadows system MKL — use LD_LIBRARY_PATH fix
      in pre_run if NWChem segfaults on SPR.
    launcher: *stampede3_launcher
    scheduler: *stampede3_scheduler
    execution: *stampede3_execution
    resources:
      nodes: 1
      mpi_ranks: 112
      omp_threads: 1
      walltime: "24:00:00"
      partition: "spr"
      account: null
      account_command: "/usr/local/etc/taccinfo"
      cores_per_node: 112     # 2×56-core Xeon CPU Max 9480
      node_memory_mb: 128000  # 128 GB HBM2e — fast but limited capacity
      max_nodes: 32           # Max nodes per job (spr queue limit)
      max_walltime: "48:00:00"
      cpu_arch: "spr"         # Intel Sapphire Rapids, AVX-512
    modules: *stampede3_modules
    env: {}
    hooks:
      pre_run:
        # Fix MKL conflict: /opt/apps/python shadows system MKL on SPR
        - "export LD_LIBRARY_PATH=$(echo $LD_LIBRARY_PATH | tr ':' '\\n' | grep -v /opt/apps/python | tr '\\n' ':')"
    file_rules: *stampede3_file_rules

  pbs_cpu:
    description: "Generic PBS/Torque cluster. Customize nwchem_executable and resources."
    launcher:
      kind: "scheduler"
      submit_command: "qsub"
      scheduler_type: "pbs"
      job_id_regex: "^(\\d+)"
      status_command: "qstat -f {job_id}"
      cancel_command: "qdel {job_id}"
    scheduler:
      system: "pbs"
      script_template: |
        #!/bin/bash
        #PBS -N {job_name}
        #PBS -o {output_file}
        #PBS -e {error_file}
        #PBS -l walltime={walltime}
        #PBS -l select={nodes}:ncpus={mpi_ranks}:mpiprocs={mpi_ranks}
        {account_line}
        {module_block}
        cd {job_dir}
        export OMP_NUM_THREADS={omp_threads}
        {pre_run_block}
        {mpi_launch} {nwchem_executable} {input_file}
      submit_script_name: "{job_name}.job"
    execution:
      nwchem_executable: "nwchem"
      mpi_launch: "mpirun -np {mpi_ranks}"
      shell: "/bin/bash"
    resources:
      nodes: 1
      mpi_ranks: 16
      omp_threads: 1
      walltime: "24:00:00"
      account: null
    modules:
      purge_first: true
      load:
        - "nwchem"
    env: {}
    hooks:
      pre_run: []
      post_run: []
    file_rules:
      output_file: "{job_name}.out"
      error_file: "{job_name}.err"
      restart_prefix: "{job_name}"
